[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read", path = "./"}]

[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 256
depth = 15

[rpc_endpoints]
arbitrum         = "${ARB_RPC_URL}"
arbitrum_sepolia = "${ARB_SEPOLIA_RPC_URL}"
ethereum         = "${ETH_RPC_URL}"
sepolia          = "${ETH_SEPOLIA_RPC_URL}"
bnb              = "${BNB_RPC_URL}"
bnb_testnet      = "${BNB_TESTNET_RPC_URL}"

[etherscan]
arbitrum         = { key = "${ARBISCAN_API_KEY}",              chain = 42161 }
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}",              chain = 421614, url = "https://api-sepolia.arbiscan.io/api" }
ethereum         = { key = "${ETHERSCAN_API_KEY}",             chain = 1 }
sepolia          = { key = "${ETH_SEPOLIA_ETHERSCAN_API_KEY}", chain = 11155111 }
bnb              = { key = "${BSCSCAN_API_KEY}",               chain = 56 }
bnb_testnet      = { key = "${BSCSCAN_API_KEY}",               chain = 97, url = "https://api-testnet.bscscan.com/api" }
