[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read", path = "./"}]

[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 256
depth = 15

[rpc_endpoints]
arbitrum         = "${ARB_RPC_URL}"
arbitrum_sepolia = "${ARB_SEPOLIA_RPC_URL}"
ethereum         = "${ETH_RPC_URL}"
sepolia          = "${ETH_SEPOLIA_RPC_URL}"

[etherscan]
arbitrum         = { key = "${ARBISCAN_API_KEY}",              chain = 42161 }
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}",              chain = 421614 }
ethereum         = { key = "${ETHERSCAN_API_KEY}",             chain = 1 }
sepolia          = { key = "${ETH_SEPOLIA_ETHERSCAN_API_KEY}", chain = 11155111 }
